<!DOCTYPE html>
<html>
<link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="shortcut icon" href="/favicon.ico" />
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
<link rel="manifest" href="/site.webmanifest" />
<head>
  <title>Sketchmon</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="gameLayout">

  <!-- CENTER AREA -->
  <div class="canvasWrap">

    <!-- TOP HUD -->
    <div class="topbar">
      <h2 id="role">Loading...</h2>
      <h3 id="timer"></h3>
    </div>

    <!-- Pokémon (drawer only) -->
    <h3 id="pokemon"></h3>

    <!-- CANVAS -->
    <canvas id="canvas"></canvas>

    <!-- TOOLS (attached to canvas) -->
<div class="tools" id="tools">
  <input type="color" id="colorPicker" />

  <!-- QUICK COLORS -->
  <div id="quickColors" class="quickColors">
    <div class="colorSwatch" data-color="#000000" style="background:#000000"></div>
    <div class="colorSwatch" data-color="#f5f5f5" style="background:#f5f5f5; border:1px solid #ddd"></div>
    <div class="colorSwatch" data-color="#ff4d4d" style="background:#ff4d4d"></div>
    <div class="colorSwatch" data-color="#4bb543" style="background:#4bb543"></div>
    <div class="colorSwatch" data-color="#3f8edc" style="background:#3f8edc"></div>
    <div class="colorSwatch" data-color="#f5d142" style="background:#f5d142"></div>
    <div class="colorSwatch" data-color="#ff96c5" style="background:#ff96c5"></div>
    <div class="colorSwatch" data-color="#c67b3e" style="background:#c67b3e"></div>
  </div>

  <input type="range" id="brushSize" min="1" max="20" value="3" />
  <button id="eraserBtn">Eraser</button>
  <button id="clearBtn">Clear</button>
</div>
    <!-- SKIP -->
    <button id="skipBtn" style="display:none;">Skip</button>

  </div>

  <!-- RIGHT PANEL -->
  <div class="rightHud">

    <!-- SCOREBOARD (TOP) -->
    <div id="scoreboard"></div>

    <!-- GUESS AREA (BOTTOM) -->
    <div class="controls">
      <input id="guessBox" placeholder="Guess Pokémon..." />
      <button id="startBtn">Start</button>
    </div>

  </div>

</div>
<!-- TOAST CONTAINER -->
<div id="toastContainer"></div>

<!-- NAME LOBBY OVERLAY -->
<div id="lobby">
  <div class="lobbyBox">
    <h1>Sketchmon</h1>
    <p>Enter your name to join</p>

    <input id="nameInput" placeholder="Your name..." maxlength="16" />
    <button id="joinBtn">Join Game</button>
  </div>
</div>

<!-- CHOOSE POKEMON OVERLAY -->
<div id="choosePokemon">
  <div class="chooseBox">
    <h1>Choose a Pokémon to draw!</h1>
    <div id="pokemonOptions"></div>
  </div>
</div>

<!-- SOCKET.IO -->
<script src="/socket.io/socket.io.js"></script>
<script src="main.js"></script>
<script src="https://unpkg.com/@discord/embedded-app-sdk"></script>

</body>
</html>
